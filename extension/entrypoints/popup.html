<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusFlow AI</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f0fdfa;
      color: #1c1917;
      width: 320px;
      min-height: 200px;
    }
    .container {
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ccfbf1;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #14b8a6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    .title {
      font-size: 1rem;
      font-weight: 600;
      color: #14b8a6;
      margin: 0;
    }
    .subtitle {
      font-size: 0.75rem;
      color: #78716c;
      margin: 0;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d6d3d1;
      flex-shrink: 0;
    }
    .status-dot.running {
      background: #34d399;
      box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.3);
    }
    .status-dot.paused {
      background: #fbbf24;
    }
    .status-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #78716c;
    }
    .info-row {
      margin-bottom: 8px;
    }
    .info-label {
      font-size: 0.7rem;
      color: #78716c;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
    }
    .info-value {
      font-size: 0.85rem;
      font-weight: 500;
      color: #1c1917;
      word-break: break-word;
    }
    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }
    .time-card {
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      border: 1px solid #ccfbf1;
    }
    .time-card-label {
      font-size: 0.65rem;
      color: #78716c;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
    }
    .time-card-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #14b8a6;
    }
    .time-card-value.remaining {
      color: #0ea5e9;
    }
    .empty-state {
      text-align: center;
      padding: 24px 8px;
    }
    .empty-state-icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .empty-state-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: #78716c;
      margin: 0 0 4px;
    }
    .empty-state-sub {
      font-size: 0.75rem;
      color: #a8a29e;
      margin: 0;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s ease;
    }
    .btn-primary {
      background: #14b8a6;
      color: #fff;
    }
    .btn-primary:hover {
      background: #0d9488;
    }
    .btn-primary:active {
      background: #0f766e;
    }
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #ccfbf1;
      text-align: center;
    }
    .footer-text {
      font-size: 0.65rem;
      color: #a8a29e;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">FF</div>
      <div>
        <p class="title">FocusFlow AI</p>
        <p class="subtitle">အာရုံစိုက်မှု အကူအညီ (Focus Companion)</p>
      </div>
    </div>

    <div id="popup-content">
      <div class="status-row">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-label" class="status-label">---</span>
      </div>

      <div class="info-row">
        <div class="info-label">ပရောဂျက် (Project)</div>
        <div id="project-name" class="info-value">---</div>
      </div>

      <div class="info-row">
        <div class="info-label">အစိတ်အပိုင်း (Sub-piece)</div>
        <div id="subpiece-name" class="info-value">---</div>
      </div>

      <div class="time-grid">
        <div class="time-card">
          <div class="time-card-label">ကြာချိန် (Elapsed)</div>
          <div id="elapsed-time" class="time-card-value">0m</div>
        </div>
        <div class="time-card">
          <div class="time-card-label">ကျန်ချိန် (Remaining)</div>
          <div id="remaining-time" class="time-card-value remaining">0m</div>
        </div>
      </div>
    </div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <div class="empty-state-icon">🌿</div>
      <p class="empty-state-title">အခုမစရသေးပါ (No active session)</p>
      <p class="empty-state-sub">FocusFlow ဝဘ်အက်ပ်မှာ အစပြုပါ</p>
    </div>

    <button id="open-app-btn" class="btn btn-primary" type="button">
      FocusFlow ဖွင့်ရန် (Open App)
    </button>

    <div class="footer">
      <p class="footer-text">FocusFlow AI — Kill The Laziness</p>
    </div>
  </div>

  <script src="../lib/popup.ts" type="module"></script>
</body>
</html>
